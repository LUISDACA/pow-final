services:
  postgres:
    image: postgres:16
    container_name: fraud_postgres
    environment:
      POSTGRES_DB: fraud_logs_db
      POSTGRES_USER: ${POSTGRES_USER:-fraud_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fraud_password}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fraud_user} -d fraud_logs_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  fraud-consumer:
    build: ./fraud-consumer
    container_name: fraud_consumer
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_PRIVATE_IP}:9092
      DATABASE_URL: postgresql://${POSTGRES_USER:-fraud_user}:${POSTGRES_PASSWORD:-fraud_password}@postgres:5432/fraud_logs_db
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    container_name: fraud_dashboard
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fraud_user}:${POSTGRES_PASSWORD:-fraud_password}@postgres:5432/fraud_logs_db
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ACCESS_TOKEN_MINUTES: ${ACCESS_TOKEN_MINUTES:-15}
      REFRESH_TOKEN_DAYS: ${REFRESH_TOKEN_DAYS:-7}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:

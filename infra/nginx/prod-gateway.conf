limit_req_zone $binary_remote_addr zone=producer_api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=dashboard_auth_limit:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=client_conn_limit:10m;

upstream producer_api {
    server API_PRIVATE_IP:8000;
}

upstream dashboard {
    server DASHBOARD_PRIVATE_IP:3000;
}

server {
    listen 80;
    server_name api.example.com dashboard.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name api.example.com dashboard.example.com;

    ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;

    limit_conn client_conn_limit 40;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    location /ingest/ {
        limit_req zone=producer_api_limit burst=20 nodelay;
        proxy_pass http://producer_api/;
    }

    location /api/auth/login {
        limit_req zone=dashboard_auth_limit burst=3 nodelay;
        proxy_pass http://dashboard;
    }

    location / {
        proxy_pass http://dashboard;
    }
}
